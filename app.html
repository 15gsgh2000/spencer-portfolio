<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Folclórico Combo Generator</title>
    <style>
        body { 
            font-family: 'Helvetica Neue', Arial, sans-serif; 
            background-color: #2c3e50; 
            color: #fff;
            text-align: center; 
            padding: 50px; 
        }
        .app-container { 
            background: #ffffff; 
            color: #333;
            padding: 40px; 
            border-radius: 10px; 
            box-shadow: 0px 4px 15px rgba(0,0,0,0.5); 
            display: inline-block; 
            max-width: 400px;
        }
        button { 
            padding: 15px 25px; 
            margin-top: 20px;
            background: #8b0000; 
            color: white; 
            font-weight: bold;
            border: none; 
            border-radius: 5px; 
            cursor: pointer; 
            font-size: 16px;
        }
        button:hover { 
            background: #a52a2a; 
        }
        .routine-display { 
            margin-top: 25px; 
            font-size: 1.2em; 
            font-weight: bold;
            background: #ecf0f1;
            padding: 20px;
            border-radius: 5px;
            border: 2px dashed #bdc3c7;
        }
        a {
            display: block;
            margin-top: 30px;
            color: #bdc3c7;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <h2>Dance Combo Generator</h2>
        <p>Click the button to generate a random traditional dance step to practice!</p>
        
        <button onclick="generateRoutine()">Generate Step!</button>

        <div class="routine-display" id="output">Ready to practice...</div>
    </div>
    
    <a href="scratch.html">&larr; Back to Scratch Page</a>

    <script>
        function generateRoutine() {
            const steps = [
                "Zapateo (Footwork)", 
                "Paseo (Walking step)", 
                "Vuelta (Turn)", 
                "Cepillado (Brushing step)", 
                "Coqueteo (Flirtatious step)"
            ];
            
            let randomStep = steps[Math.floor(Math.random() * steps.length)];

            document.getElementById("output").innerHTML = "Practice this step:<br><br><span style='color:#8b0000; font-size: 1.5em;'>" + randomStep + "</span>";
        }
    </script>
</body>
</html>
